version: '3.8'

services:
  nats:
    image: nats:latest
    command: "-js -sd /data"
    ports:
      - "4222:4222"
    volumes:
      - nats-data:/data

  ingestion:
    build: 
      context: .
      dockerfile: Dockerfile.ingestion
    environment:
      - NATS_URL=nats://nats:4222
      - DATABASE_URL=postgres://postgres:kanha%232407@host.docker.internal:5432/root-pay?sslmode=disable
    ports:
      - "8081:8081"
    depends_on:
      - nats

  moderation:
    build: 
      context: .
      dockerfile: Dockerfile.moderation
    environment:
      - NATS_URL=nats://nats:4222
      - DISCORD_WEBHOOK_URL=https://discord.com/api/webhooks/1511739244585156741/ctqfNzQLr5I4MvRWQsuCapye5qpND3ZpL-ajhy5VCNss7Xckv5uQAyET4MxjbsRLnbMp
    depends_on:
      - nats

  frontend-sse:
    build: 
      context: .
      dockerfile: Dockerfile.sse
    environment:
      - NATS_URL=nats://nats:4222
    ports:
      - "8082:8082"
    depends_on:
      - nats

  obs-engine:
    build: 
      context: .
      dockerfile: Dockerfile.obs
    environment:
      - NATS_URL=nats://nats:4222
    depends_on:
      - nats

volumes:
  nats-data: